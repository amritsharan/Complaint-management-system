<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard - Complaint Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .glass {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .bg-indigo-soft {
            background-color: #f8faff;
        }
    </style>
</head>

<body class="bg-indigo-soft min-h-screen">
    <nav class="glass sticky top-0 z-50 px-6 py-4 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-2">
            <div class="bg-indigo-600 p-1.5 rounded-lg">
                <i data-lucide="shield-check" class="text-white w-5 h-5"></i>
            </div>
            <span class="text-xl font-bold text-gray-800">CMS Portal</span>
        </div>
        <div class="flex items-center gap-4">
            <span id="user-display" class="text-sm font-medium text-gray-600 hidden md:inline"></span>
            <button id="logout-btn"
                class="flex items-center gap-2 text-sm font-semibold text-red-600 hover:bg-red-50 p-2 rounded-lg transition-colors">
                <i data-lucide="log-out" class="w-4 h-4"></i> Logout
            </button>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-6 grid grid-cols-1 lg:grid-cols-3 gap-8">
        <!-- Sidebar: Submit Complaint -->
        <section class="lg:col-span-1">
            <div class="glass rounded-2xl p-6 shadow-xl sticky top-24">
                <h2 class="text-xl font-bold text-gray-800 mb-6 flex items-center gap-2">
                    <i data-lucide="plus-circle" class="text-indigo-600 w-5 h-5"></i> New Complaint
                </h2>
                <form id="complaint-form" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Title</label>
                        <input type="text" id="title" required
                            class="w-full px-4 py-2 rounded-xl border border-gray-200 focus:ring-2 focus:ring-indigo-500 outline-none transition-all"
                            placeholder="Brief issue title">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Category</label>
                        <select id="category" required
                            class="w-full px-4 py-2 rounded-xl border border-gray-200 focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                            <option value="Technical">Technical</option>
                            <option value="Billing">Billing</option>
                            <option value="Service">Service</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
                        <textarea id="description" required rows="4"
                            class="w-full px-4 py-2 rounded-xl border border-gray-200 focus:ring-2 focus:ring-indigo-500 outline-none transition-all resize-none"
                            placeholder="Describe your problem in detail..."></textarea>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Evidence URL (Optional)</label>
                        <input type="url" id="file_url"
                            class="w-full px-4 py-2 rounded-xl border border-gray-200 focus:ring-2 focus:ring-indigo-500 outline-none transition-all"
                            placeholder="https://link-to-image.com">
                    </div>
                    <button type="submit"
                        class="w-full bg-indigo-600 text-white py-3 rounded-xl font-semibold hover:bg-indigo-700 transition-colors shadow-lg">Submit
                        Complaint</button>
                </form>
            </div>
        </section>

        <!-- Main Content: History -->
        <section class="lg:col-span-2 space-y-6">
            <h2 class="text-2xl font-bold text-gray-800 flex items-center gap-2">
                <i data-lucide="history" class="text-indigo-600 w-6 h-6"></i> Your Complaints
            </h2>
            <div id="complaints-list" class="space-y-4">
                <!-- Complaints will be loaded here -->
                <div class="p-12 text-center text-gray-400">Loading your history...</div>
            </div>
        </section>
    </main>

    <script src="js/config.js"></script>
    <script src="js/dashboard.js"></script>
    <script>lucide.createIcons();</script>
</body>

</html>

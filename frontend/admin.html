<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Complaint Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .glass {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .bg-admin-soft {
            background-color: #fcfdfe;
        }
    </style>
</head>

<body class="bg-admin-soft min-h-screen">
    <nav class="glass sticky top-0 z-50 px-6 py-4 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-2">
            <div class="bg-gray-800 p-1.5 rounded-lg">
                <i data-lucide="layout-dashboard" class="text-white w-5 h-5"></i>
            </div>
            <span class="text-xl font-bold text-gray-800">Admin Control</span>
        </div>
        <div class="flex items-center gap-4">
            <span
                class="px-2 py-1 rounded bg-indigo-100 text-indigo-700 text-[10px] font-bold uppercase tracking-widest">Administrator</span>
            <button id="logout-btn"
                class="flex items-center gap-2 text-sm font-semibold text-red-600 hover:bg-red-50 p-2 rounded-lg transition-colors">
                <i data-lucide="log-out" class="w-4 h-4"></i> Logout
            </button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-4">
            <h1 class="text-3xl font-bold text-gray-800">Manage Complaints</h1>
            <div class="flex items-center gap-4 w-full md:w-auto">
                <div class="relative flex-1 md:flex-none">
                    <i data-lucide="filter" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"></i>
                    <select id="filter-status"
                        class="w-full md:w-48 pl-10 pr-4 py-2 rounded-xl border border-gray-200 focus:ring-2 focus:ring-indigo-500 outline-none appearance-none bg-white text-sm font-medium">
                        <option value="all">All Statuses</option>
                        <option value="Pending">Pending</option>
                        <option value="In Progress">In Progress</option>
                        <option value="Resolved">Resolved</option>
                    </select>
                </div>
                <button id="refresh-btn"
                    class="p-2 rounded-xl bg-white border border-gray-200 hover:shadow-md transition-all">
                    <i data-lucide="rotate-cw" class="w-5 h-5 text-gray-600"></i>
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 gap-6" id="admin-complaints-list">
            <div class="text-center p-20 text-gray-400">Fetching complaints...</div>
        </div>
    </main>

    <!-- Update Modal (Hidden) -->
    <div id="update-modal"
        class="fixed inset-0 bg-black/50 backdrop-blur-sm z-[100] flex items-center justify-center hidden p-4">
        <div class="glass w-full max-w-lg rounded-3xl p-8 shadow-2xl animate-in fade-in zoom-in duration-200">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold text-gray-800">Update Complaint</h3>
                <button id="close-modal" class="p-2 hover:bg-gray-100 rounded-full transition-colors"><i data-lucide="x"
                        class="w-5 h-5"></i></button>
            </div>

            <form id="update-form" class="space-y-6">
                <input type="hidden" id="modal-complaint-id">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Status</label>
                    <select id="modal-status"
                        class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-indigo-500 outline-none">
                        <option value="Pending">Pending</option>
                        <option value="In Progress">In Progress</option>
                        <option value="Resolved">Resolved</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Admin Remarks</label>
                    <textarea id="modal-remarks" rows="4"
                        class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-indigo-500 outline-none resize-none"
                        placeholder="Provide details about the resolution..."></textarea>
                </div>
                <button type="submit"
                    class="w-full bg-indigo-600 text-white py-3 rounded-xl font-semibold hover:bg-indigo-700 transition-colors shadow-lg">Save
                    Changes</button>
            </form>
        </div>
    </div>

    <script src="js/admin.js"></script>
    <script>lucide.createIcons();</script>
</body>

</html>
